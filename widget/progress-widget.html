<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode Progress</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --text: #e0e0e0;
  --muted: #8888aa;
  --accent: #6366f1;
  --accent-glow: #818cf8;
  --running: #22c55e;
  --done: #6366f1;
  --error: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: transparent;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-app-region: drag;
}

/* ---- Floating Ball ---- */
.container {
  position: fixed;
  bottom: 40px;
  right: 40px;
  z-index: 99999;
}

.ball {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid rgba(99, 102, 241, 0.3);
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.15), 0 4px 24px rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
  position: relative;
  -webkit-app-region: no-drag;
}

.ball:hover {
  transform: scale(1.08);
  border-color: var(--accent-glow);
  box-shadow: 0 0 32px rgba(99, 102, 241, 0.3), 0 4px 24px rgba(0,0,0,0.4);
}

.ball.active {
  border-color: var(--running);
  box-shadow: 0 0 24px rgba(34, 197, 94, 0.25), 0 4px 24px rgba(0,0,0,0.4);
}
.ball.active .icon { color: var(--running); }

.icon {
  font-size: 22px;
  color: var(--muted);
  transition: color 0.3s;
}

/* Pulse ring when active */
.ball.active::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--running);
  opacity: 0;
  animation: pulse-ring 1.5s ease-out infinite;
}
.ball.active::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid var(--running);
  opacity: 0;
  animation: pulse-ring 1.5s ease-out 0.5s infinite;
}

@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.3); opacity: 0; }
}

/* Tool count badge */
.badge {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 20px;
  height: 20px;
  border-radius: 10px;
  background: var(--running);
  color: #000;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.2s, transform 0.2s;
}
.badge.visible { opacity: 1; transform: scale(1); }

/* ---- Detail Panel ---- */
.panel {
  position: absolute;
  bottom: 68px;
  right: 0;
  width: 320px;
  max-height: 420px;
  background: var(--surface);
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  display: none;
  flex-direction: column;
  overflow: hidden;
  -webkit-app-region: no-drag;
}
.panel.open { display: flex; }

.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-header h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.02em;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
}
.status-dot.active { background: var(--running); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.tool-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  margin-bottom: 4px;
  font-size: 12px;
  transition: background 0.15s;
}
.tool-item:hover { background: rgba(255,255,255,0.04); }
.tool-item .tool-icon { font-size: 16px; width: 22px; text-align: center; }
.tool-item .tool-name { color: var(--text); font-weight: 500; flex: 1; }
.tool-item .tool-status {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
  letter-spacing: 0.03em;
}
.tool-status.running { background: rgba(34,197,94,0.15); color: var(--running); }
.tool-status.done { background: rgba(99,102,241,0.12); color: var(--accent); }

.panel-footer {
  padding: 10px 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}

.empty-state {
  text-align: center;
  padding: 24px 12px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}
.empty-state .big-icon { font-size: 32px; display: block; margin-bottom: 8px; }

/* Connection indicator */
.conn-status {
  position: fixed;
  top: 8px;
  right: 12px;
  font-size: 10px;
  color: var(--muted);
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="container" id="container">
  <!-- Floating Ball -->
  <div class="ball" id="ball" title="OpenCode Progress">
    <span class="icon" id="ball-icon">&#9674;</span>
    <span class="badge" id="badge">0</span>
  </div>

  <!-- Detail Panel -->
  <div class="panel" id="panel">
    <div class="panel-header">
      <h3>OpenCode Progress</h3>
      <span class="status-dot" id="status-dot"></span>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-state">
        <span class="big-icon">&#9674;</span>
        Waiting for tasks...
      </div>
    </div>
    <div class="panel-footer">
      <span id="footer-left">Idle</span>
      <span id="footer-right"></span>
    </div>
  </div>
</div>

<div class="conn-status" id="conn-status"></div>

<script>
const PORT = 19822;
const API = `http://127.0.0.1:${PORT}`;

const ball = document.getElementById("ball");
const ballIcon = document.getElementById("ball-icon");
const badge = document.getElementById("badge");
const panel = document.getElementById("panel");
const panelBody = document.getElementById("panel-body");
const statusDot = document.getElementById("status-dot");
const footerLeft = document.getElementById("footer-left");
const footerRight = document.getElementById("footer-right");
const connStatus = document.getElementById("conn-status");

let isOpen = false;
let reconnectTimer = null;

const TOOL_ICONS = {
  bash: "\u{1F4BB}", read: "\u{1F4D6}", write: "\u{270F}\u{FE0F}",
  edit: "\u{1F527}", grep: "\u{1F50D}", glob: "\u{1F4C1}",
  task: "\u{1F916}", webfetch: "\u{1F310}", question: "\u{2753}",
  todowrite: "\u{1F4CB}", skill: "\u{1F3AF}",
};

function toolIcon(tool) {
  return TOOL_ICONS[tool] || "\u{2699}\u{FE0F}";
}

function formatTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function elapsed(iso) {
  if (!iso) return "";
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 1000) return "<1s";
  if (ms < 60000) return Math.floor(ms / 1000) + "s";
  return Math.floor(ms / 60000) + "m " + Math.floor((ms % 60000) / 1000) + "s";
}

function render(state) {
  const active = state.active || state.toolCount > 0;
  const count = state.toolCount || 0;

  // Ball state
  ball.classList.toggle("active", active);
  ballIcon.textContent = active ? "\u{25CF}" : "\u{25CB}";

  // Badge
  badge.textContent = count;
  badge.classList.toggle("visible", count > 0);

  // Status dot
  statusDot.classList.toggle("active", active);

  // Footer
  footerLeft.textContent = active ? `${count} tool${count !== 1 ? "s" : ""} running` : "Idle";
  footerRight.textContent = state.lastUpdated ? `Updated ${formatTime(state.lastUpdated)}` : "";

  // Panel body
  const tools = state.activeTools || [];
  const runningTools = tools.filter(t => t.status === "running");
  const doneTools = tools.filter(t => t.status === "done").slice(-10);

  if (tools.length === 0) {
    panelBody.innerHTML = `<div class="empty-state"><span class="big-icon">\u{25CB}</span>Waiting for tasks...</div>`;
  } else {
    let html = "";
    const show = [...runningTools, ...doneTools];
    for (const t of show) {
      const icon = toolIcon(t.tool);
      const elapsedStr = t.status === "running" ? elapsed(t.startedAt) : "";
      html += `<div class="tool-item">
        <span class="tool-icon">${icon}</span>
        <span class="tool-name">${t.tool}${elapsedStr ? ` <span style="color:var(--muted);font-size:10px">${elapsedStr}</span>` : ""}</span>
        <span class="tool-status ${t.status}">${t.status === "running" ? "RUN" : "OK"}</span>
      </div>`;
    }
    panelBody.innerHTML = html;
  }

  // Connection status
  connStatus.style.display = "none";
}

function connectSSE() {
  connStatus.style.display = "block";
  connStatus.textContent = "connecting...";
  connStatus.style.color = "var(--muted)";

  try {
    const evtSource = new EventSource(`${API}/events`);

    evtSource.onopen = () => {
      connStatus.style.display = "none";
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    evtSource.onmessage = (event) => {
      try {
        const state = JSON.parse(event.data);
        render(state);
      } catch {}
    };

    evtSource.onerror = () => {
      evtSource.close();
      connStatus.textContent = "disconnected";
      connStatus.style.color = "var(--error)";
      if (!reconnectTimer) reconnectTimer = setTimeout(connectSSE, 3000);
    };
  } catch {
    if (!reconnectTimer) reconnectTimer = setTimeout(connectSSE, 3000);
  }
}

// Poll fallback (runs alongside SSE, no conflict)
setInterval(async () => {
  try {
    const res = await fetch(`${API}/state`);
    if (!res.ok) throw new Error("fetch failed");
    const state = await res.json();
    render(state);
  } catch { /* SSE handles real-time; poll is backup */ }
}, 5000);

// Toggle panel
ball.addEventListener("click", (e) => {
  e.stopPropagation();
  isOpen = !isOpen;
  panel.classList.toggle("open", isOpen);
});

// Close panel on outside click
document.addEventListener("click", (e) => {
  if (isOpen && !panel.contains(e.target) && e.target !== ball) {
    isOpen = false;
    panel.classList.remove("open");
  }
});

// Keyboard shortcut: Esc to close
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && isOpen) {
    isOpen = false;
    panel.classList.remove("open");
  }
});

// Init
connectSSE();

// Initial fetch
fetch(`${API}/state`)
  .then(r => r.json())
  .then(render)
  .catch(() => {});
</script>
</body>
</html>
